version: "1.0"
namespace: wippy.session

entries:
  - name: definition
    kind: ns.definition
    meta:
      title: Session
      description: User sessions and conversation management

  # wippy.session:api_router
  - name: api_router
    kind: ns.requirement
    meta:
      description: Injects API router configuration into endpoints
      parent: app.deps:dep.wippy.session
    targets:
      - entry: wippy.session.api:delete_session
        path: .meta.router
      - entry: wippy.session.api:delete_session.endpoint
        path: .meta.router
      - entry: wippy.session.api:get_artifact
        path: .meta.router
      - entry: wippy.session.api:get_artifact.endpoint
        path: .meta.router
      - entry: wippy.session.api:get_artifact_content
        path: .meta.router
      - entry: wippy.session.api:get_artifact_content.endpoint
        path: .meta.router
      - entry: wippy.session.api:get_session
        path: .meta.router
      - entry: wippy.session.api:get_session.endpoint
        path: .meta.router
      - entry: wippy.session.api:list_sessions
        path: .meta.router
      - entry: wippy.session.api:list_sessions.endpoint
        path: .meta.router
      - entry: wippy.session.api:session_messages
        path: .meta.router
      - entry: wippy.session.api:session_messages.endpoint
        path: .meta.router

  # Requirements
  - name: database_resource
    kind: ns.requirement
    meta:
      description: "Database resource for session storage"
    targets:
      - entry: wippy.session.env:database_resource
        path: ".default"
      - entry: wippy.session.migration:01_create_contexts_table
        path: ".meta.target_db"
      - entry: wippy.session.migration:02_create_sessions_table
        path: ".meta.target_db"
      - entry: wippy.session.migration:03_create_session_contexts_table
        path: ".meta.target_db"
      - entry: wippy.session.migration:04_create_messages_table
        path: ".meta.target_db"
      - entry: wippy.session.migration:05_create_artifacts_table
        path: ".meta.target_db"
      - entry: wippy.session.migration:06_add_session_config_meta_fields
        path: ".meta.target_db"
      - entry: wippy.session.migration:07_migrate_session_data_to_new_structure
        path: ".meta.target_db"
      - entry: wippy.session.migration:08_remove_legacy_session_fields
        path: ".meta.target_db"
      - entry: wippy.session.migration:09_add_user_id_to_artifacts_table
        path: ".meta.target_db"
      - entry: wippy.session.migration:10_index_artifacts_session_created
        path: ".meta.target_db"
    default: "app:db"

  - name: token_checkpoint_threshold
    kind: ns.requirement
    meta:
      description: "Token count threshold for creating conversation checkpoints"
    targets:
      - entry: wippy.session.env:token_checkpoint_threshold
        path: ".default"
    default: "50000"

  - name: max_message_limit
    kind: ns.requirement
    meta:
      description: "Maximum messages to load for prompt building"
    targets:
      - entry: wippy.session.env:max_message_limit
        path: ".default"
    default: "500"

  - name: checkpoint_function_id
    kind: ns.requirement
    meta:
      description: "Function ID for generating checkpoint summaries (checkpoints enabled when set)"
    targets:
      - entry: wippy.session.env:checkpoint_function_id
        path: ".default"
    default: "wippy.session.funcs:checkpoint"

  - name: title_function_id
    kind: ns.requirement
    meta:
      description: "Function ID for generating session titles (automatic titles enabled when set)"
    targets:
      - entry: wippy.session.env:title_function_id
        path: ".default"
    default: "wippy.session.funcs:title"

  - name: default_host
    kind: ns.requirement
    meta:
      description: "Default host for session processes"
    targets:
      - entry: wippy.session.env:default_host
        path: ".default"
    default: "app:processes"

  - name: gc_interval
    kind: ns.requirement
    meta:
      description: "Garbage collection interval for session cleanup"
    targets:
      - entry: wippy.session.env:gc_interval
        path: ".default"
    default: "300s"

  - name: delegation_func_id
    kind: ns.requirement
    meta:
      description: "Function ID for delegation calls (delegation enabled when set)"
    targets:
      - entry: wippy.session.env:delegation_func_id
        path: ".default"

  - name: on_session_end_func_id
    kind: ns.requirement
    meta:
      description: "Function ID called when a session ends (runs in the plugin actor context). Optional; empty disables the hook."
    default: ""
    targets:
      - entry: wippy.session.env:on_session_end_func_id
        path: ".default"

  - name: env_storage
    kind: ns.requirement
    meta:
      description: "Storage backend for session environment variables"
    targets:
      - entry: wippy.session.env:database_resource
        path: ".storage"
      - entry: wippy.session.env:token_checkpoint_threshold
        path: ".storage"
      - entry: wippy.session.env:max_message_limit
        path: ".storage"
      - entry: wippy.session.env:checkpoint_function_id
        path: ".storage"
      - entry: wippy.session.env:title_function_id
        path: ".storage"
      - entry: wippy.session.env:default_host
        path: ".storage"
      - entry: wippy.session.env:session_security_scope
        path: ".storage"
      - entry: wippy.session.env:gc_interval
        path: ".storage"
      - entry: wippy.session.env:delegation_func_id
        path: ".storage"
      - entry: wippy.session.env:on_session_end_func_id
        path: ".storage"

  # wippy.session:consts
  - name: consts
    kind: library.lua
    meta:
      comment: System-wide constants and configuration management for session system
    source: file://consts.lua
    modules:
      - env
      - time

  # wippy.session:session_service
  - name: session_service
    kind: contract.definition
    meta:
      comment: Session-owned lifecycle service for external runtimes.
      tags:
        - session
        - runtime
        - lifecycle
        - service
      description: |
        Stable session service contract for runtimes such as channel and DM.
        Callers ask session to ensure, read, update, or delete a session instead
        of importing wippy.session.persist repositories or hand-rolling context
        creation and status recovery.

        ensure is the canonical create-or-rehydrate operation. It creates the
        primary session context when the session is new, returns the existing row
        when it already exists, and by default resets stale running/failed status
        to idle so a runtime can safely spawn the session process.
    methods:
      - name: ensure
        description: Create a session if absent, otherwise return and prepare the existing session for rehydration.
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "session_id": { "type": "string" },
                  "user_id": { "type": "string" },
                  "kind": { "type": "string", "default": "default" },
                  "title": { "type": "string", "default": "" },
                  "meta": { "type": "object", "default": {} },
                  "config": { "type": "object", "default": {} },
                  "primary_context_id": { "type": "string" },
                  "primary_context_data": {
                    "description": "Initial primary context payload. Objects are JSON encoded; strings are stored as-is.",
                    "oneOf": [
                      { "type": "object" },
                      { "type": "string" }
                    ],
                    "default": {}
                  },
                  "reset_status": {
                    "type": "boolean",
                    "description": "When true or omitted, running/failed sessions are reset to idle for safe rehydration.",
                    "default": true
                  }
                },
                "required": ["session_id", "user_id"]
              }
            format: application/schema+json
        output_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "session": { "type": "object" },
                  "created": { "type": "boolean" },
                  "recovered": { "type": "boolean" },
                  "primary_context_id": { "type": "string" }
                },
                "required": ["session", "created", "recovered", "primary_context_id"]
              }
            format: application/schema+json
      - name: get
        description: Read one session by id, optionally scoped to a user id.
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "session_id": { "type": "string" },
                  "user_id": { "type": "string" }
                },
                "required": ["session_id"]
              }
            format: application/schema+json
      - name: update
        description: Update session metadata through the session-owned API.
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "session_id": { "type": "string" },
                  "updates": {
                    "type": "object",
                    "properties": {
                      "title": { "type": "string" },
                      "status": { "type": "string" },
                      "kind": { "type": "string" },
                      "meta": { "type": "object" },
                      "config": { "type": "object" },
                      "public_meta": { "type": "object" },
                      "last_message_date": { "type": "integer" }
                    }
                  }
                },
                "required": ["session_id", "updates"]
              }
            format: application/schema+json
      - name: delete
        description: Delete a session and the primary context owned by the service.
        input_schemas:
          - definition: |
              {
                "type": "object",
                "properties": {
                  "session_id": { "type": "string" },
                  "user_id": {
                    "type": "string",
                    "description": "Optional owner guard. When provided, delete fails unless the session belongs to this user."
                  }
                },
                "required": ["session_id"]
              }
            format: application/schema+json

  # wippy.session:service
  - name: service
    kind: library.lua
    meta:
      comment: SDK implementation for the wippy.session:session_service contract.
      tags:
        - session
        - runtime
        - lifecycle
    source: file://service.lua
    modules:
      - json
      - uuid
    imports:
      consts: wippy.session:consts
      session_repo: wippy.session.persist:session_repo
      context_repo: wippy.session.persist:context_repo

  # wippy.session:service_binding
  - name: service_binding
    kind: contract.binding
    meta:
      comment: Built-in implementation of the session service contract.
      tags:
        - session
        - runtime
        - lifecycle
    contracts:
      - contract: wippy.session:session_service
        methods:
          ensure: wippy.session:ensure_session
          get: wippy.session:get_session_service
          update: wippy.session:update_session_service
          delete: wippy.session:delete_session_service

  # wippy.session:ensure_session
  - name: ensure_session
    kind: function.lua
    meta:
      comment: Contract method wrapper for wippy.session:service.ensure.
      tags:
        - session
        - runtime
    source: file://ensure_session.lua
    imports:
      service: wippy.session:service
    method: handle

  # wippy.session:get_session_service
  - name: get_session_service
    kind: function.lua
    meta:
      comment: Contract method wrapper for wippy.session:service.get.
      tags:
        - session
        - runtime
    source: file://get_session_service.lua
    imports:
      service: wippy.session:service
    method: handle

  # wippy.session:update_session_service
  - name: update_session_service
    kind: function.lua
    meta:
      comment: Contract method wrapper for wippy.session:service.update.
      tags:
        - session
        - runtime
    source: file://update_session_service.lua
    imports:
      service: wippy.session:service
    method: handle

  # wippy.session:delete_session_service
  - name: delete_session_service
    kind: function.lua
    meta:
      comment: Contract method wrapper for wippy.session:service.delete.
      tags:
        - session
        - runtime
    source: file://delete_session_service.lua
    imports:
      service: wippy.session:service
    method: handle

  # wippy.session:service_test
  - name: service_test_security_policy
    kind: security.policy
    meta:
      scope: dev
      comment: Allows the session service contract test to open the built-in binding.
      tags:
        - session
        - runtime
        - test
    policy:
      actions: "*"
      resources: "*"
      effect: allow
    groups:
      - test_group

  # wippy.session:service_test
  - name: service_test
    kind: function.lua
    meta:
      type: test
      suite: session
      comment: Tests the session-owned service SDK and contract binding.
      tags:
        - session
        - runtime
        - lifecycle
        - test
    source: file://service_test.lua
    modules:
      - contract
      - json
      - security
      - sql
      - uuid
    imports:
      consts: wippy.session:consts
      context_repo: wippy.session.persist:context_repo
      service: wippy.session:service
      session_repo: wippy.session.persist:session_repo
      test: wippy.test:test
      wait_for_boot: app:wait_for_boot
    method: run

  # Dependencies
  - name: dep.wippy.llm
    kind: ns.dependency
    component: wippy/llm
    version: ">=v0.4.0"

  - name: dep.wippy.migration
    kind: ns.dependency
    component: wippy/migration
    version: ">=v0.3.0"

  - name: dep.wippy.agent
    kind: ns.dependency
    component: wippy/agent
    version: ">=v0.4.12"

  - name: dep.wippy.views
    kind: ns.dependency
    component: wippy/views
    version: ">=v0.4.0"

  - name: dep.wippy.test
    kind: ns.dependency
    meta:
      scope: dev
    component: wippy/test
    version: "*"

  # wippy.session:start_tokens
  - name: start_tokens
    kind: library.lua
    meta:
      comment: Library for creating and validating session start tokens
    source: file://start_tokens.lua
    modules:
      - crypto
      - base64
      - json
    imports:
      consts: wippy.session:consts

  # wippy.session:start_tokens_test
  - name: start_tokens_test
    kind: function.lua
    meta:
      type: test
      suite: session
      comment: Tests the start_tokens library for creating and validating session start tokens
    source: file://start_tokens_test.lua
    modules:
      - base64
    imports:
      start_tokens: wippy.session:start_tokens
      test: wippy.test:test
      wait_for_boot: app:wait_for_boot
    method: run

  # wippy.session:prompt_builder
  # wippy.session:file_provider
  # Optional, session-owned contract. An application that stores uploads binds it so the
  # session resolves a message's file_uuid to file metadata WITHOUT depending on any
  # concrete uploads module. Modeled on wippy.agent:resolver: prompt_builder consumes it
  # only when something binds it (implementations() check) and otherwise falls back to the
  # upload_repo / file_resolver passed via build options, so apps that never bind it work.
  - name: file_provider
    kind: contract.definition
    meta:
      comment: Optional file/upload metadata provider the session resolves message attachments through.
      description: |
        Resolve a file/upload identifier to its metadata for prompt rendering. Applications
        that own uploads provide a binding; when none exists, prompt_builder falls back to
        the upload_repo / file_resolver passed via build options. The session depends on no
        uploads module.
    methods:
      - name: get_info
        description: Resolve a file_uuid to its upload metadata.
        input_schemas:
          - definition: |
              { "type": "object", "properties": { "file_uuid": { "type": "string" } }, "required": ["file_uuid"] }
            format: application/schema+json
        output_schemas:
          - definition: |
              { "type": "object", "properties": { "size": { "type": "integer" }, "mime_type": { "type": "string" }, "metadata": { "type": "object", "properties": { "filename": { "type": "string" } } } } }
            format: application/schema+json

  - name: prompt_builder
    kind: library.lua
    meta:
      comment: Prompt construction and formatting library for session messages
    source: file://prompt_builder.lua
    modules:
      - json
      - contract
    imports:
      consts: wippy.session:consts
      prompt: wippy.llm:prompt

  # wippy.session:prompt_builder_test
  - name: prompt_builder_test
    kind: function.lua
    meta:
      type: test
      suite: session
      comment: Tests the prompt builder functionality
    source: file://prompt_builder_test.lua
    modules:
      - json
    imports:
      prompt_builder: wippy.session:prompt_builder
      consts: wippy.session:consts
      test: wippy.test:test
    method: run
