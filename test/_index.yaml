version: "1.0"
namespace: app

entries:
  - name: wait_for_boot
    kind: function.lua
    meta:
      type: test
      suite: "00_setup"
      comment: Runs bootloaders and waits for session tables before tests run
    source: file://wait_for_boot.lua
    modules:
      - sql
      - time
    imports:
      encryption_key_bootloader: wippy.bootloader.bootloaders:encryption_key
      migration_bootloader: wippy.migration:migration_bootloader
    method: run

  - name: db
    kind: db.sql.sqlite
    meta:
      comment: File-backed SQLite for tests, recreated each run via make test. An in-memory DB drops its schema under parallel test connections.
    file: ./.wippy/test.db

  - name: env_storage
    kind: env.storage.file
    meta:
      type: envstorage
    file_path: ./.wippy/test.env
    auto_create: true

  - name: processes
    kind: process.host
    meta:
      comment: Process host for bootloader and services
    host:
      workers: 2
      max_processes: 10
    lifecycle:
      auto_start: true

  - name: gateway
    kind: http.service
    meta:
      comment: Test HTTP server
    addr: :19087
    lifecycle:
      auto_start: false

  - name: api
    kind: http.router
    meta:
      comment: Test API router for session endpoints (meta.router app:api)
      server: gateway
    prefix: /api

  - name: api.public
    kind: http.router
    meta:
      comment: Test public API router
      server: gateway
    prefix: /api/public

  - name: dep.wippy.session
    kind: ns.dependency
    meta:
      description: Session module configuration for testing
    component: "wippy/session"
    parameters:
      - name: database_resource
        value: app:db
      - name: api_router
        value: app:api.public
      - name: env_storage
        value: app:env_storage

  - name: dep.wippy.llm
    kind: ns.dependency
    meta:
      description: LLM module configuration for testing
    component: "wippy/llm"
    parameters:
      - name: process_host
        value: app:processes
      - name: env_storage
        value: app:env_storage

  - name: dep.wippy.bootloader
    kind: ns.dependency
    meta:
      description: Bootloader configuration for testing
    component: "wippy/bootloader"
    parameters:
      - name: application_host
        value: app:processes
      - name: env_storage
        value: app:env_storage

  - name: dep.wippy.views
    kind: ns.dependency
    meta:
      description: Views module for rendering
    component: "wippy/views"
    parameters:
      - name: api_router
        value: app:api.public
      - name: env_storage
        value: app:env_storage

  - name: encryption_key
    kind: env.variable
    readonly: false
    storage: app:env_storage
    default: "046e5a0594bb339ef5ddcd8c3a9b9b828ed066d53ee99138ec6da8795e38b55d"
    variable: ENCRYPTION_KEY
